<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>SwC Arch Linux 终端</title>
  <style>
    body {
      margin: 0;
      background: #1a1e2b;
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: 'JetBrains Mono', monospace;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }
    #log-panel {
      background: #0d1117;
      color: #c9d1d9;
      flex: 0 0 50px;
      overflow-y: auto;
      padding: 4px 10px;
      border-bottom: 2px solid #2a3a4a;
      font-size: 0.7rem;
      line-height: 1.3;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-item { margin-bottom: 2px; }
    .log-error { color: #f85149; }
    .log-success { color: #3fb950; }
    .log-info { color: #58a6ff; }

    #screen-container {
      flex: 1;
      position: relative;
      background: #000;
      min-height: 200px;
      overflow: hidden;
    }
    #screen {
      width: 100%;
      height: 100%;
      border: none;
      position: absolute;
      top: 0;
      left: 0;
    }

    #keyboard {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(42, 46, 59, 0.96);
      backdrop-filter: blur(6px);
      padding: 8px 6px 10px;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.6);
      z-index: 100;
      max-width: 98vw;
      touch-action: none;
    }
    .keyboard-header {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2px 0 6px;
      cursor: grab;
    }
    .keyboard-header:active { cursor: grabbing; }
    .drag-handle {
      width: 45px;
      height: 6px;
      background: #7a7e8b;
      border-radius: 3px;
    }
    .key-row {
      display: flex;
      flex-wrap: nowrap;
      gap: 3px;
      align-items: center;
    }
    .key-btn {
      background: #3f4352;
      border: 1px solid #6a6e7b;
      color: #f0f0f0;
      width: 34px;
      height: 34px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      text-align: center;
      transition: background 0.1s;
      flex: 0 0 auto;
      touch-action: none;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
      position: relative;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .key-btn:active, .key-btn.pressed {
      background: #5a5e7b;
    }
    .key-btn.space { width: auto; flex: 1; min-width: 60px; }
    .key-btn.tab { width: 52px; }
    .key-btn.caps { width: 60px; }
    .key-btn.enter { width: 60px; }
    .key-btn.shift { width: 70px; }
    .key-btn.backspace { width: 56px; }
    .key-btn.del { width: 56px; }
    .key-btn.fn, .key-btn.ctrl, .key-btn.win, .key-btn.alt { width: 48px; }
    .key-btn.arrow { width: 34px; }
    .key-btn.fkey { width: 38px; }
    .key-btn.bottom-square {
      width: 34px;
      height: 34px;
      min-width: 34px;
      max-width: 34px;
      flex: none;
    }
    .key-btn.active { background: #6a8e4b; border-color: #8ab86a; }
    .spacer {
      flex: 0 0 auto;
      visibility: hidden;
    }
  </style>
</head>
<body>
<div id="log-panel">
  <div class="log-item log-info">[系统] 初始化中...</div>
</div>
<div id="screen-container">
  <div id="screen"></div>
</div>
<div id="keyboard">
  <div class="keyboard-header" id="dragHandle">
    <div class="drag-handle"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/v86@latest/build/libv86.js"></script>
<script>
(function() {
  const logPanel = document.getElementById('log-panel');
  const screenDiv = document.getElementById('screen');
  const keyboardDiv = document.getElementById('keyboard');
  const dragHandle = document.getElementById('dragHandle');

  function log(msg, type = 'info') {
    const item = document.createElement('div');
    item.className = `log-item log-${type}`;
    item.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logPanel.appendChild(item);
    logPanel.scrollTop = logPanel.scrollHeight;
  }

  if (typeof V86 === 'undefined') { log('V86 库加载失败', 'error'); return; }
  log('V86 库加载成功', 'success');

  const config = {
    screen_container: screenDiv,
    bios: { url: "https://cdn.jsdelivr.net/gh/copy/v86@master/bios/seabios.bin" },
    vga_bios: { url: "https://cdn.jsdelivr.net/gh/copy/v86@master/bios/vgabios.bin" },
    cdrom: { url: "https://cdn.jsdelivr.net/gh/copy/images@master/linux.iso" },
    wasm_path: "https://cdn.jsdelivr.net/npm/v86@latest/build/v86.wasm",
    autostart: true,
    disable_keyboard: false,
    disable_speaker: true,
    acpi: true,
  };

  let emulator;
  try {
    emulator = new V86(config);
    log('模拟器实例已创建', 'success');
  } catch (e) {
    log('创建模拟器实例失败: ' + e.message, 'error');
    return;
  }

  emulator.add_listener("emulator-loaded", () => {
    log('模拟器已启动！命令行就绪。', 'success');
    log('当前系统：Arch Linux', 'info');
    log('支持多点触控，可同时按下修饰键', 'info');
  });
  emulator.add_listener("error", (e) => log('模拟器错误: ' + (e.message || e), 'error'));

  // 键盘布局 (每行带有左右对称偏移量 offset)
  const keyRows = [
    { offset: 0, keys: [
      {label:'F1', code:'F1', key:'F1', keyCode:112, extraClass:'fkey'},
      {label:'F2', code:'F2', key:'F2', keyCode:113, extraClass:'fkey'},
      {label:'F3', code:'F3', key:'F3', keyCode:114, extraClass:'fkey'},
      {label:'F4', code:'F4', key:'F4', keyCode:115, extraClass:'fkey'},
      {label:'F5', code:'F5', key:'F5', keyCode:116, extraClass:'fkey'},
      {label:'F6', code:'F6', key:'F6', keyCode:117, extraClass:'fkey'},
      {label:'F7', code:'F7', key:'F7', keyCode:118, extraClass:'fkey'},
      {label:'F8', code:'F8', key:'F8', keyCode:119, extraClass:'fkey'},
      {label:'F9', code:'F9', key:'F9', keyCode:120, extraClass:'fkey'},
      {label:'F10', code:'F10', key:'F10', keyCode:121, extraClass:'fkey'},
      {label:'F11', code:'F11', key:'F11', keyCode:122, extraClass:'fkey'},
      {label:'F12', code:'F12', key:'F12', keyCode:123, extraClass:'fkey'},
    ]},
    { offset: 0, keys: [
      {label:'`', shiftLabel:'~', code:'Backquote', key:'`', shiftKey:'~', keyCode:192},
      {label:'1', shiftLabel:'!', code:'Digit1', key:'1', shiftKey:'!', keyCode:49},
      {label:'2', shiftLabel:'@', code:'Digit2', key:'2', shiftKey:'@', keyCode:50},
      {label:'3', shiftLabel:'#', code:'Digit3', key:'3', shiftKey:'#', keyCode:51},
      {label:'4', shiftLabel:'$', code:'Digit4', key:'4', shiftKey:'$', keyCode:52},
      {label:'5', shiftLabel:'%', code:'Digit5', key:'5', shiftKey:'%', keyCode:53},
      {label:'6', shiftLabel:'^', code:'Digit6', key:'6', shiftKey:'^', keyCode:54},
      {label:'7', shiftLabel:'&', code:'Digit7', key:'7', shiftKey:'&', keyCode:55},
      {label:'8', shiftLabel:'*', code:'Digit8', key:'8', shiftKey:'*', keyCode:56},
      {label:'9', shiftLabel:'(', code:'Digit9', key:'9', shiftKey:'(', keyCode:57},
      {label:'0', shiftLabel:')', code:'Digit0', key:'0', shiftKey:')', keyCode:48},
      {label:'-', shiftLabel:'_', code:'Minus', key:'-', shiftKey:'_', keyCode:173},
      {label:'=', shiftLabel:'+', code:'Equal', key:'=', shiftKey:'+', keyCode:61},
      {label:'⌫', shiftLabel:'⌫', code:'Backspace', key:'Backspace', keyCode:8, extraClass:'backspace'}
    ]},
    { offset: 9, keys: [
      {label:'Tab', code:'Tab', key:'Tab', keyCode:9, extraClass:'tab'},
      {label:'q', shiftLabel:'Q', code:'KeyQ', key:'q', shiftKey:'Q', keyCode:81},
      {label:'w', shiftLabel:'W', code:'KeyW', key:'w', shiftKey:'W', keyCode:87},
      {label:'e', shiftLabel:'E', code:'KeyE', key:'e', shiftKey:'E', keyCode:69},
      {label:'r', shiftLabel:'R', code:'KeyR', key:'r', shiftKey:'R', keyCode:82},
      {label:'t', shiftLabel:'T', code:'KeyT', key:'t', shiftKey:'T', keyCode:84},
      {label:'y', shiftLabel:'Y', code:'KeyY', key:'y', shiftKey:'Y', keyCode:89},
      {label:'u', shiftLabel:'U', code:'KeyU', key:'u', shiftKey:'U', keyCode:85},
      {label:'i', shiftLabel:'I', code:'KeyI', key:'i', shiftKey:'I', keyCode:73},
      {label:'o', shiftLabel:'O', code:'KeyO', key:'o', shiftKey:'O', keyCode:79},
      {label:'p', shiftLabel:'P', code:'KeyP', key:'p', shiftKey:'P', keyCode:80},
      {label:'[', shiftLabel:'{', code:'BracketLeft', key:'[', shiftKey:'{', keyCode:219},
      {label:']', shiftLabel:'}', code:'BracketRight', key:']', shiftKey:'}', keyCode:221},
      {label:'\\', shiftLabel:'|', code:'Backslash', key:'\\', shiftKey:'|', keyCode:220},
      {label:'Del', code:'Delete', key:'Delete', keyCode:46, extraClass:'del'}
    ]},
    { offset: 18, keys: [
      {label:'Caps', code:'CapsLock', key:'CapsLock', keyCode:20, caps:true, extraClass:'caps'},
      {label:'a', shiftLabel:'A', code:'KeyA', key:'a', shiftKey:'A', keyCode:65},
      {label:'s', shiftLabel:'S', code:'KeyS', key:'s', shiftKey:'S', keyCode:83},
      {label:'d', shiftLabel:'D', code:'KeyD', key:'d', shiftKey:'D', keyCode:68},
      {label:'f', shiftLabel:'F', code:'KeyF', key:'f', shiftKey:'F', keyCode:70},
      {label:'g', shiftLabel:'G', code:'KeyG', key:'g', shiftKey:'G', keyCode:71},
      {label:'h', shiftLabel:'H', code:'KeyH', key:'h', shiftKey:'H', keyCode:72},
      {label:'j', shiftLabel:'J', code:'KeyJ', key:'j', shiftKey:'J', keyCode:74},
      {label:'k', shiftLabel:'K', code:'KeyK', key:'k', shiftKey:'K', keyCode:75},
      {label:'l', shiftLabel:'L', code:'KeyL', key:'l', shiftKey:'L', keyCode:76},
      {label:';', shiftLabel:':', code:'Semicolon', key:';', shiftKey:':', keyCode:186},
      {label:"'", shiftLabel:'"', code:'Quote', key:"'", shiftKey:'"', keyCode:222},
      {label:'Enter', code:'Enter', key:'Enter', keyCode:13, extraClass:'enter'}
    ]},
    { offset: 27, keys: [
      {label:'Shift', code:'ShiftLeft', key:'Shift', keyCode:16, shift:true, extraClass:'shift'},
      {label:'z', shiftLabel:'Z', code:'KeyZ', key:'z', shiftKey:'Z', keyCode:90},
      {label:'x', shiftLabel:'X', code:'KeyX', key:'x', shiftKey:'X', keyCode:88},
      {label:'c', shiftLabel:'C', code:'KeyC', key:'c', shiftKey:'C', keyCode:67},
      {label:'v', shiftLabel:'V', code:'KeyV', key:'v', shiftKey:'V', keyCode:86},
      {label:'b', shiftLabel:'B', code:'KeyB', key:'b', shiftKey:'B', keyCode:66},
      {label:'n', shiftLabel:'N', code:'KeyN', key:'n', shiftKey:'N', keyCode:78},
      {label:'m', shiftLabel:'M', code:'KeyM', key:'m', shiftKey:'M', keyCode:77},
      {label:',', shiftLabel:'<', code:'Comma', key:',', shiftKey:'<', keyCode:188},
      {label:'.', shiftLabel:'>', code:'Period', key:'.', shiftKey:'>', keyCode:190},
      {label:'/', shiftLabel:'?', code:'Slash', key:'/', shiftKey:'?', keyCode:191},
      {label:'↑', code:'ArrowUp', key:'ArrowUp', keyCode:38, extraClass:'arrow'},
      {label:'Shift', code:'ShiftRight', key:'Shift', keyCode:16, shift:true, extraClass:'shift'}
    ]},
    { offset: 27, keys: [
      {label:'Fn', code:'Fn', key:'Fn', keyCode:0, extraClass:'fn bottom-square'},
      {label:'Ctrl', code:'ControlLeft', key:'Control', keyCode:17, extraClass:'ctrl bottom-square'},
      {label:'Win', code:'MetaLeft', key:'Meta', keyCode:91, extraClass:'win bottom-square'},
      {label:'Alt', code:'AltLeft', key:'Alt', keyCode:18, extraClass:'alt bottom-square'},
      {label:'Space', code:'Space', key:' ', keyCode:32, space:true},
      {label:'Alt', code:'AltRight', key:'Alt', keyCode:18, extraClass:'alt bottom-square'},
      {label:'Ctrl', code:'ControlRight', key:'Control', keyCode:17, extraClass:'ctrl bottom-square'},
      {label:'←', code:'ArrowLeft', key:'ArrowLeft', keyCode:37, extraClass:'arrow bottom-square'},
      {label:'↓', code:'ArrowDown', key:'ArrowDown', keyCode:40, extraClass:'arrow bottom-square'},
      {label:'→', code:'ArrowRight', key:'ArrowRight', keyCode:39, extraClass:'arrow bottom-square'},
      {label:'Fn', code:'Fn2', key:'Fn', keyCode:0, extraClass:'fn bottom-square'}
    ]}
  ];

  const activeTouches = new Map();
  const pressedKeys = new Set();
  let capsActive = false;
  const allButtons = [];

  function dispatchKeyEvent(type, keyData, keyOverride) {
    if (!emulator) return;
    const code = keyData.code;
    const keyCode = keyData.keyCode;
    const key = keyOverride || keyData.key;
    const event = new KeyboardEvent(type, {
      key, code, keyCode, which: keyCode,
      bubbles: true, cancelable: true,
      view: window,
      location: code.includes('Left') ? 1 : (code.includes('Right') ? 2 : 0),
      repeat: false, isComposing: false,
    });
    Object.defineProperty(event, 'charCode', { value: keyCode });
    screenDiv.dispatchEvent(event);
  }

  function isShiftPressed() {
    return pressedKeys.has('ShiftLeft') || pressedKeys.has('ShiftRight');
  }

  function getEffectiveKey(keyData) {
    let key = keyData.key;
    const isLetter = keyData.code && keyData.code.startsWith('Key') && keyData.code.length === 4;
    const shift = isShiftPressed();
    if (isLetter) {
      if ((shift || capsActive) && keyData.shiftKey) key = keyData.shiftKey;
    } else {
      if (shift && keyData.shiftKey) key = keyData.shiftKey;
    }
    return key;
  }

  function onKeyDown(keyData, btn, touchId) {
    const code = keyData.code;
    if (keyData.caps) {
      capsActive = !capsActive;
      btn.classList.toggle('active', capsActive);
      dispatchKeyEvent('keydown', keyData, 'CapsLock');
      dispatchKeyEvent('keyup', keyData, 'CapsLock');
      updateButtonLabels();
      return;
    }
    if (!pressedKeys.has(code)) {
      pressedKeys.add(code);
      if (keyData.shift) {
        dispatchKeyEvent('keydown', keyData, 'Shift');
      } else {
        const key = getEffectiveKey(keyData);
        dispatchKeyEvent('keydown', keyData, key);
      }
    }
    activeTouches.set(touchId, { btn, keyData });
    btn.classList.add('pressed');
    if (keyData.shift) updateButtonLabels();
  }

  function onKeyUp(touchId) {
    const entry = activeTouches.get(touchId);
    if (!entry) return;
    activeTouches.delete(touchId);
    const { btn, keyData } = entry;
    const code = keyData.code;
    let stillPressed = false;
    for (const e of activeTouches.values()) {
      if (e.keyData.code === code) { stillPressed = true; break; }
    }
    if (!stillPressed) {
      pressedKeys.delete(code);
      if (keyData.shift) {
        dispatchKeyEvent('keyup', keyData, 'Shift');
      } else {
        const key = getEffectiveKey(keyData);
        dispatchKeyEvent('keyup', keyData, key);
      }
    }
    if (!stillPressed) btn.classList.remove('pressed');
    if (keyData.shift) updateButtonLabels();
  }

  function updateButtonLabels() {
    const shift = isShiftPressed();
    allButtons.forEach(btn => {
      const kd = btn._keyData;
      if (!kd) return;
      if (kd.shift) {
        btn.textContent = shift ? '▲ Shift' : 'Shift';
      } else if (kd.caps) {
        btn.textContent = capsActive ? '▲ Caps' : 'Caps';
      } else {
        const useShift = (shift && !kd.special) || (capsActive && kd.shiftKey && kd.code && kd.code.startsWith('Key'));
        btn.textContent = useShift && kd.shiftLabel ? kd.shiftLabel : kd.label;
      }
    });
  }

  function bindButtonEvents(btn, keyData) {
    btn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      const touchId = e.pointerId || 0;
      onKeyDown(keyData, btn, touchId);
      btn.setPointerCapture(e.pointerId);
    });
    btn.addEventListener('pointerup', (e) => {
      e.preventDefault();
      onKeyUp(e.pointerId);
    });
    btn.addEventListener('pointercancel', (e) => onKeyUp(e.pointerId));
  }

  function buildKeyboard() {
    allButtons.length = 0;
    keyboardDiv.querySelectorAll('.key-row').forEach(r => r.remove());
    keyRows.forEach(row => {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'key-row';
      // 左侧 spacer
      if (row.offset > 0) {
        const leftSpacer = document.createElement('div');
        leftSpacer.className = 'spacer';
        leftSpacer.style.width = row.offset + 'px';
        rowDiv.appendChild(leftSpacer);
      }
      row.keys.forEach(k => {
        const btn = document.createElement('button');
        btn.className = 'key-btn';
        if (k.extraClass) btn.classList.add(...k.extraClass.split(' '));
        if (k.space) btn.classList.add('space');
        btn.textContent = k.label;
        btn.setAttribute('data-code', k.code);
        btn._keyData = k;
        bindButtonEvents(btn, k);
        rowDiv.appendChild(btn);
        allButtons.push(btn);
      });
      // 右侧 spacer (与左侧对称)
      if (row.offset > 0) {
        const rightSpacer = document.createElement('div');
        rightSpacer.className = 'spacer';
        rightSpacer.style.width = row.offset + 'px';
        rowDiv.appendChild(rightSpacer);
      }
      keyboardDiv.appendChild(rowDiv);
    });
    updateButtonLabels();
  }

  buildKeyboard();
  log('虚拟键盘已就绪 (多点触控)', 'success');

  // 拖动逻辑
  let dragging = false, startX, startY, startLeft, startTop;
  function onDragStart(e) {
    e.preventDefault();
    const touch = e.touches ? e.touches[0] : e;
    dragging = true;
    startX = touch.clientX; startY = touch.clientY;
    const rect = keyboardDiv.getBoundingClientRect();
    startLeft = rect.left; startTop = rect.top;
    keyboardDiv.style.transition = 'none';
    keyboardDiv.style.transform = 'none';
    keyboardDiv.style.left = startLeft + 'px';
    keyboardDiv.style.top = startTop + 'px';
    keyboardDiv.style.bottom = 'auto';
  }
  function onDragMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const touch = e.touches ? e.touches[0] : e;
    const dx = touch.clientX - startX, dy = touch.clientY - startY;
    let newLeft = startLeft + dx, newTop = startTop + dy;
    const maxLeft = window.innerWidth - keyboardDiv.offsetWidth;
    const maxTop = window.innerHeight - keyboardDiv.offsetHeight;
    newLeft = Math.max(0, Math.min(newLeft, maxLeft));
    newTop = Math.max(0, Math.min(newTop, maxTop));
    keyboardDiv.style.left = newLeft + 'px';
    keyboardDiv.style.top = newTop + 'px';
  }
  function onDragEnd() { dragging = false; keyboardDiv.style.transition = ''; }

  dragHandle.addEventListener('touchstart', onDragStart);
  document.addEventListener('touchmove', onDragMove, { passive: false });
  document.addEventListener('touchend', onDragEnd);
  dragHandle.addEventListener('mousedown', onDragStart);
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);

  function positionKeyboard() {
    keyboardDiv.style.left = '50%';
    keyboardDiv.style.transform = 'translateX(-50%)';
    keyboardDiv.style.bottom = '10px';
    keyboardDiv.style.top = 'auto';
  }
  positionKeyboard();
  window.addEventListener('resize', positionKeyboard);
})();
</script>
</body>
</html>
