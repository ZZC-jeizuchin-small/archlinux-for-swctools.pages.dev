<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>SwC Linux 终端</title>
  <style>
    body {
      margin: 0;
      background: #1a1e2b;
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'JetBrains Mono', monospace;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }

    #screen-container {
      flex: 1;
      position: relative;
      background: #000;
      min-height: 0;
      overflow: hidden;
    }

    #screen {
      width: 100%;
      height: 100%;
      border: none;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* 键盘容器 */
    #keyboard {
      position: fixed;
      width: 620px;
      background: rgba(42, 46, 59, 0.96);
      backdrop-filter: blur(6px);
      padding: 8px 6px 10px;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.6);
      z-index: 100;
      touch-action: none;
      box-sizing: border-box;
      left: 50%;
      bottom: 8px;
      transform: translateX(-50%);
    }

    .drag-handle {
      display: flex;
      justify-content: center;
      padding: 4px 0;
      cursor: grab;
    }
    .drag-handle:active { cursor: grabbing; }
    .drag-bar {
      width: 45px;
      height: 5px;
      background: #7a7e8b;
      border-radius: 3px;
    }

    .key-row {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .key-btn {
      background: #3f4352;
      border: 1px solid #6a6e7b;
      color: #f0f0f0;
      width: 40px;
      height: 40px;
      border-radius: 5px;
      font-size: 0.8rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 1px;
      flex-shrink: 0;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
      box-sizing: border-box;
    }

    .key-btn:active { background: #5a5e7b; }
    .key-btn.pressed { background: #4a6a9e; }

    .key-btn.w40 { width: 40px; }
    .key-btn.w60 { width: 60px; }
    .key-btn.w80 { width: 80px; }
    .key-btn.w100 { width: 100px; }
    .key-btn.w220 { width: 220px; }

    .key-btn.active { background: #6a8e4b; border-color: #8ab86a; }
    .key-btn.modifier { background: #3a3a3a; font-size: 0.7rem; }
  </style>
</head>
<body>
  <div id="screen-container">
    <div id="screen"></div>
  </div>

  <div id="keyboard">
    <div class="drag-handle" id="dragHandle">
      <div class="drag-bar"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/v86@latest/build/libv86.js"></script>
  <script>
  (function() {
    const screenDiv = document.getElementById('screen');
    const keyboardDiv = document.getElementById('keyboard');
    const dragHandle = document.getElementById('dragHandle');

    // ========== V86 初始化 ==========
    if (typeof V86 === 'undefined') return;

    const config = {
      screen_container: screenDiv,
      bios: { url: "https://cdn.jsdelivr.net/gh/copy/v86@master/bios/seabios.bin" },
      vga_bios: { url: "https://cdn.jsdelivr.net/gh/copy/v86@master/bios/vgabios.bin" },
      cdrom: { url: "https://cdn.jsdelivr.net/gh/copy/images@master/linux.iso" },
      wasm_path: "https://cdn.jsdelivr.net/npm/v86@latest/build/v86.wasm",
      autostart: true,
      disable_keyboard: false,
      disable_speaker: true,
      acpi: true,
    };

    let emulator;
    try {
      emulator = new V86(config);
    } catch (e) {
      return;
    }

    // ========== 键盘布局数据 ==========
    const keyRows = [
      // F1-F12
      {
        keys: [
          { label: 'F1',  code: 'F1',  extraClass: 'w40 modifier' },
          { label: 'F2',  code: 'F2',  extraClass: 'w40 modifier' },
          { label: 'F3',  code: 'F3',  extraClass: 'w40 modifier' },
          { label: 'F4',  code: 'F4',  extraClass: 'w40 modifier' },
          { label: 'F5',  code: 'F5',  extraClass: 'w40 modifier' },
          { label: 'F6',  code: 'F6',  extraClass: 'w40 modifier' },
          { label: 'F7',  code: 'F7',  extraClass: 'w40 modifier' },
          { label: 'F8',  code: 'F8',  extraClass: 'w40 modifier' },
          { label: 'F9',  code: 'F9',  extraClass: 'w40 modifier' },
          { label: 'F10', code: 'F10', extraClass: 'w40 modifier' },
          { label: 'F11', code: 'F11', extraClass: 'w40 modifier' },
          { label: 'F12', code: 'F12', extraClass: 'w40 modifier' },
        ]
      },
      // 数字行
      {
        keys: [
          { label: 'Esc', code: 'Escape',    extraClass: 'w40 modifier' },
          { label: '`',   shiftLabel: '~',  code: 'Backquote', extraClass: 'w40' },
          { label: '1',   shiftLabel: '!',  code: 'Digit1',    extraClass: 'w40' },
          { label: '2',   shiftLabel: '@',  code: 'Digit2',    extraClass: 'w40' },
          { label: '3',   shiftLabel: '#',  code: 'Digit3',    extraClass: 'w40' },
          { label: '4',   shiftLabel: '$',  code: 'Digit4',    extraClass: 'w40' },
          { label: '5',   shiftLabel: '%',  code: 'Digit5',    extraClass: 'w40' },
          { label: '6',   shiftLabel: '^',  code: 'Digit6',    extraClass: 'w40' },
          { label: '7',   shiftLabel: '&',  code: 'Digit7',    extraClass: 'w40' },
          { label: '8',   shiftLabel: '*',  code: 'Digit8',    extraClass: 'w40' },
          { label: '9',   shiftLabel: '(',  code: 'Digit9',    extraClass: 'w40' },
          { label: '0',   shiftLabel: ')',  code: 'Digit0',    extraClass: 'w40' },
          { label: '-',   shiftLabel: '_',  code: 'Minus',     extraClass: 'w40' },
          { label: '=',   shiftLabel: '+',  code: 'Equal',     extraClass: 'w40' },
          { label: '⌫',   code: 'Backspace', extraClass: 'w60 modifier' },
        ]
      },
      // QWERTY 行
      {
        keys: [
          { label: 'Tab', code: 'Tab',  extraClass: 'w60 modifier' },
          { label: 'q',   shiftLabel: 'Q',  code: 'KeyQ', extraClass: 'w40' },
          { label: 'w',   shiftLabel: 'W',  code: 'KeyW', extraClass: 'w40' },
          { label: 'e',   shiftLabel: 'E',  code: 'KeyE', extraClass: 'w40' },
          { label: 'r',   shiftLabel: 'R',  code: 'KeyR', extraClass: 'w40' },
          { label: 't',   shiftLabel: 'T',  code: 'KeyT', extraClass: 'w40' },
          { label: 'y',   shiftLabel: 'Y',  code: 'KeyY', extraClass: 'w40' },
          { label: 'u',   shiftLabel: 'U',  code: 'KeyU', extraClass: 'w40' },
          { label: 'i',   shiftLabel: 'I',  code: 'KeyI', extraClass: 'w40' },
          { label: 'o',   shiftLabel: 'O',  code: 'KeyO', extraClass: 'w40' },
          { label: 'p',   shiftLabel: 'P',  code: 'KeyP', extraClass: 'w40' },
          { label: '[',   shiftLabel: '{',  code: 'BracketLeft',  extraClass: 'w40' },
          { label: ']',   shiftLabel: '}',  code: 'BracketRight', extraClass: 'w40' },
          { label: '\\',  shiftLabel: '|',  code: 'Backslash',    extraClass: 'w40' },
          { label: 'Del', code: 'Delete', extraClass: 'w40 modifier' },
        ]
      },
      // ASDF 行
      {
        keys: [
          { label: 'Caps', code: 'CapsLock', caps: true, extraClass: 'w80 modifier' },
          { label: 'a',    shiftLabel: 'A',  code: 'KeyA', extraClass: 'w40' },
          { label: 's',    shiftLabel: 'S',  code: 'KeyS', extraClass: 'w40' },
          { label: 'd',    shiftLabel: 'D',  code: 'KeyD', extraClass: 'w40' },
          { label: 'f',    shiftLabel: 'F',  code: 'KeyF', extraClass: 'w40' },
          { label: 'g',    shiftLabel: 'G',  code: 'KeyG', extraClass: 'w40' },
          { label: 'h',    shiftLabel: 'H',  code: 'KeyH', extraClass: 'w40' },
          { label: 'j',    shiftLabel: 'J',  code: 'KeyJ', extraClass: 'w40' },
          { label: 'k',    shiftLabel: 'K',  code: 'KeyK', extraClass: 'w40' },
          { label: 'l',    shiftLabel: 'L',  code: 'KeyL', extraClass: 'w40' },
          { label: ';',    shiftLabel: ':',  code: 'Semicolon', extraClass: 'w40' },
          { label: "'",    shiftLabel: '"',  code: 'Quote',     extraClass: 'w40' },
          { label: 'Enter', code: 'Enter', extraClass: 'w100 modifier' },
        ]
      },
      // ZXCV 行
      {
        keys: [
          { label: 'Shift', code: 'ShiftLeft',  shift: true, extraClass: 'w100 modifier' },
          { label: 'z',     shiftLabel: 'Z',     code: 'KeyZ', extraClass: 'w40' },
          { label: 'x',     shiftLabel: 'X',     code: 'KeyX', extraClass: 'w40' },
          { label: 'c',     shiftLabel: 'C',     code: 'KeyC', extraClass: 'w40' },
          { label: 'v',     shiftLabel: 'V',     code: 'KeyV', extraClass: 'w40' },
          { label: 'b',     shiftLabel: 'B',     code: 'KeyB', extraClass: 'w40' },
          { label: 'n',     shiftLabel: 'N',     code: 'KeyN', extraClass: 'w40' },
          { label: 'm',     shiftLabel: 'M',     code: 'KeyM', extraClass: 'w40' },
          { label: ',',     shiftLabel: '<',     code: 'Comma',  extraClass: 'w40' },
          { label: '.',     shiftLabel: '>',     code: 'Period', extraClass: 'w40' },
          { label: '/',     shiftLabel: '?',     code: 'Slash',  extraClass: 'w40' },
          { label: '↑',     code: 'ArrowUp',     extraClass: 'w40' },
          { label: 'Shift', code: 'ShiftRight', shift: true, extraClass: 'w80 modifier' },
        ]
      },
      // 底行
      {
        keys: [
          { label: 'Fn',    code: 'Fn',            extraClass: 'w40 modifier' },
          { label: 'Ctrl',  code: 'ControlLeft',   extraClass: 'w40 modifier' },
          { label: 'Win',   code: 'MetaLeft',      extraClass: 'w40 modifier' },
          { label: 'Alt',   code: 'AltLeft',       extraClass: 'w40 modifier' },
          { label: 'Space', code: 'Space',         extraClass: 'w220' },
          { label: 'Alt',   code: 'AltRight',      extraClass: 'w40 modifier' },
          { label: 'Ctrl',  code: 'ControlRight',  extraClass: 'w40 modifier' },
          { label: '←',     code: 'ArrowLeft',     extraClass: 'w40' },
          { label: '↓',     code: 'ArrowDown',     extraClass: 'w40' },
          { label: '→',     code: 'ArrowRight',    extraClass: 'w40' },
          { label: 'Fn',    code: 'Fn',            extraClass: 'w40 modifier' },
        ]
      }
    ];

    // ========== 键盘交互 ==========
    const pressedKeys = new Set();
    let capsActive = false;
    const allButtons = [];

    function dispatchKeyEvent(type, code, key, keyCode) {
      if (!emulator) return;
      const event = new KeyboardEvent(type, {
        key, code, keyCode, which: keyCode,
        bubbles: true, cancelable: true, view: window,
        location: code.includes('Left') ? 1 : (code.includes('Right') ? 2 : 0),
      });
      Object.defineProperty(event, 'charCode', { value: keyCode });
      screenDiv.dispatchEvent(event);
    }

    function updateButtonLabels() {
      const shift = pressedKeys.has('ShiftLeft') || pressedKeys.has('ShiftRight');
      allButtons.forEach(btn => {
        const kd = btn._keyData;
        if (!kd) return;
        if (kd.shift) {
          btn.textContent = shift ? '▲ Shift' : 'Shift';
        } else if (kd.caps) {
          btn.textContent = capsActive ? '▲ Caps' : 'Caps';
        } else {
          const useShift = (shift || capsActive) && kd.shiftLabel;
          btn.textContent = useShift ? kd.shiftLabel : kd.label;
        }
      });
    }

    function onPointerDown(e, keyData, btn) {
      e.preventDefault();
      e.stopPropagation();
      const code = keyData.code;

      if (keyData.caps) {
        capsActive = !capsActive;
        btn.classList.toggle('active', capsActive);
        dispatchKeyEvent('keydown', code, 'CapsLock', 20);
        dispatchKeyEvent('keyup', code, 'CapsLock', 20);
        updateButtonLabels();
        return;
      }

      pressedKeys.add(code);
      const key = keyData.shift ? 'Shift' : keyData.label;
      const keyCode = keyData.shift ? 16 : 0;
      dispatchKeyEvent('keydown', code, key, keyCode);

      btn.classList.add('pressed');
      updateButtonLabels();
    }

    function onPointerUp(e, keyData, btn) {
      e.preventDefault();
      const code = keyData.code;

      pressedKeys.delete(code);
      const key = keyData.shift ? 'Shift' : keyData.label;
      const keyCode = keyData.shift ? 16 : 0;
      dispatchKeyEvent('keyup', code, key, keyCode);

      btn.classList.remove('pressed');
      updateButtonLabels();
    }

    function buildButton(keyData) {
      const btn = document.createElement('div');
      btn.className = 'key-btn ' + (keyData.extraClass || '');
      btn.textContent = keyData.label;
      btn._keyData = keyData;
      btn.addEventListener('pointerdown', e => onPointerDown(e, keyData, btn));
      btn.addEventListener('pointerup', e => onPointerUp(e, keyData, btn));
      btn.addEventListener('pointerleave', e => {
        if (btn.classList.contains('pressed')) {
          onPointerUp(e, keyData, btn);
        }
      });
      return btn;
    }

    function buildKeyboard() {
      keyboardDiv.querySelectorAll('.key-row').forEach(r => r.remove());
      allButtons.length = 0;
      keyRows.forEach(rowDef => {
        const row = document.createElement('div');
        row.className = 'key-row';
        rowDef.keys.forEach(k => {
          const btn = buildButton(k);
          row.appendChild(btn);
          allButtons.push(btn);
        });
        keyboardDiv.appendChild(row);
      });
    }

    buildKeyboard();

    // ========== 稳定的拖动逻辑 ==========
    let dragging = false;
    let dragStartX, dragStartY;
    let initialLeft, initialTop;

    function startDrag(e) {
      e.preventDefault();
      dragging = true;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      // 获取当前位置（已经是绝对定位的 left/top）
      const rect = keyboardDiv.getBoundingClientRect();
      initialLeft = rect.left;
      initialTop = rect.top;
      // 移除可能的 transform，直接使用 left/top 定位
      keyboardDiv.style.transform = 'none';
      keyboardDiv.style.left = initialLeft + 'px';
      keyboardDiv.style.top = initialTop + 'px';
      keyboardDiv.style.bottom = 'auto';
      dragHandle.setPointerCapture(e.pointerId);
    }

    function moveDrag(e) {
      if (!dragging) return;
      e.preventDefault();
      const dx = e.clientX - dragStartX;
      const dy = e.clientY - dragStartY;
      let newLeft = initialLeft + dx;
      let newTop = initialTop + dy;
      // 边界限制
      const maxLeft = window.innerWidth - keyboardDiv.offsetWidth;
      const maxTop = window.innerHeight - keyboardDiv.offsetHeight;
      newLeft = Math.max(0, Math.min(newLeft, maxLeft));
      newTop = Math.max(0, Math.min(newTop, maxTop));
      keyboardDiv.style.left = newLeft + 'px';
      keyboardDiv.style.top = newTop + 'px';
    }

    function endDrag() {
      if (!dragging) return;
      dragging = false;
    }

    dragHandle.addEventListener('pointerdown', startDrag);
    document.addEventListener('pointermove', moveDrag);
    document.addEventListener('pointerup', endDrag);

    // 初始定位到底部居中
    function initialPosition() {
      keyboardDiv.style.left = '50%';
      keyboardDiv.style.top = 'auto';
      keyboardDiv.style.bottom = '8px';
      keyboardDiv.style.transform = 'translateX(-50%)';
    }
    initialPosition();
    window.addEventListener('resize', initialPosition);

  })();
  </script>
</body>
</html>
