<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>SwC Linux 终端</title>
  <style>
    body {
      margin: 0;
      background: #000;
      height: 100vh;
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ========== 全屏加载浮窗 ========== */
    #loading-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(8px);
      z-index: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #ccc;
      font-size: 0.9rem;
      padding: 20px;
      box-sizing: border-box;
      transition: opacity 0.3s;
    }
    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-panel {
      background: #111318;
      border: 1px solid #2d3139;
      border-radius: 16px;
      padding: 28px 24px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }
    .loading-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: #fff;
      text-align: center;
    }
    .file-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }
    .file-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .file-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .file-name {
      font-weight: 500;
      color: #aaa;
    }
    .file-status {
      font-size: 0.8rem;
    }
    .progress-bar {
      height: 6px;
      background: #1f2228;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: #4a6a9e;
      transition: width 0.3s;
    }
    .status-ok { color: #3fb950; }
    .status-err { color: #f85149; }
    .status-wait { color: #8b949e; }
    .status-loading { color: #58a6ff; }

    .close-btn {
      display: block;
      margin: 0 auto;
      padding: 10px 32px;
      background: #2d3139;
      color: #ccc;
      border: 1px solid #4a4f59;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
    }
    .close-btn:hover { background: #3d424d; }

    /* 终端屏幕容器 */
    #screen-container {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #000;
      z-index: 1;
    }
    #screen {
      width: 100%; height: 100%;
      border: none;
    }

    /* 虚拟键盘样式保持不变 */
    #keyboard {
      position: fixed;
      width: auto;
      max-width: 95vw;
      background: transparent;
      padding: 4px 6px 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      z-index: 100;
      touch-action: none;
      box-sizing: border-box;
      left: 50%;
      transform: translateX(-50%);
      bottom: 8px;
      will-change: left, top;
    }
    .drag-handle {
      display: flex; justify-content: center;
      padding: 4px 0; cursor: grab;
    }
    .drag-handle:active { cursor: grabbing; }
    .drag-bar {
      width: 45px; height: 5px;
      background: rgba(122,126,139,0.8);
      border-radius: 3px;
    }
    .key-row {
      display: flex; justify-content: center; width: 100%;
    }
    .key-btn {
      background: #3f4352;
      border: 1px solid #6a6e7b;
      color: #f0f0f0;
      width: 40px; height: 40px;
      border-radius: 5px;
      font-size: 0.8rem; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      margin: 0 1px;
      flex-shrink: 0;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
      box-sizing: border-box;
    }
    .key-btn:active { background: #5a5e7b; }
    .key-btn.pressed { background: #4a6a9e; }
    .key-btn.w40 { width: 40px; }
    .key-btn.w60 { width: 60px; }
    .key-btn.w80 { width: 80px; }
    .key-btn.w100 { width: 100px; }
    .key-btn.w220 { width: 220px; }
    .key-btn.active { background: #6a8e4b; border-color: #8ab86a; }
    .key-btn.modifier { background: #3a3a3a; font-size: 0.7rem; }
  </style>
</head>
<body>
  <!-- 全屏加载浮窗 -->
  <div id="loading-overlay">
    <div class="loading-panel">
      <div class="loading-title">📡 正在加载系统资源</div>
      <div class="file-list" id="file-list"></div>
      <button class="close-btn" id="close-loading-btn">关闭浮窗 (可随时关闭)</button>
    </div>
  </div>

  <div id="screen-container">
    <div id="screen"></div>
  </div>

  <div id="keyboard">
    <div class="drag-handle" id="dragHandle">
      <div class="drag-bar"></div>
    </div>
  </div>

  <script src="./libv86.js"></script>
  <script>
  (function() {
    // ==================== 全屏加载浮窗逻辑 ====================
    const loadingOverlay = document.getElementById('loading-overlay');
    const closeBtn = document.getElementById('close-loading-btn');
    const fileListEl = document.getElementById('file-list');

    // 定义监控的6个文件以及v86引擎状态
    const items = [
      { id: 'libv86', name: 'libv86.js', type: 'script' },
      { id: 'wasm', name: 'v86.wasm', type: 'fetch', url: './v86.wasm' },
      { id: 'state', name: '状态文件 (state.bin)', type: 'fetch', url: 'https://stuff.aoodyconcor.de/d/local/robin/v86state.bin?sign=rVokpNP7dAffY5DSjoNBAIRyQkww7sTcTdIbEv3hwqY=:0' },
      { id: 'sw', name: 'Service Worker (sw.js)', type: 'sw' },
      { id: 'seabios', name: 'seabios.bin (未使用)', type: 'head', url: './seabios.bin' },
      { id: 'vgabios', name: 'vgabios.bin (未使用)', type: 'head', url: './vgabios.bin' },
      { id: 'v86engine', name: 'V86 引擎初始化', type: 'engine' }
    ];

    const state = {};
    items.forEach(item => {
      state[item.id] = { status: 'pending', progress: 0, message: '' };
    });

    function renderLoadingUI() {
      fileListEl.innerHTML = items.map(item => {
        const s = state[item.id];
        let statusText = '';
        let statusClass = '';
        switch (s.status) {
          case 'pending':
            statusText = '等待中';
            statusClass = 'status-wait';
            break;
          case 'loading':
            statusText = `下载中 ${s.progress}%`;
            statusClass = 'status-loading';
            break;
          case 'done':
            statusText = '✅ 完成';
            statusClass = 'status-ok';
            break;
          case 'error':
            statusText = '❌ 失败';
            statusClass = 'status-err';
            break;
        }
        return `
          <div class="file-item">
            <div class="file-label">
              <span class="file-name">${item.name}</span>
              <span class="file-status ${statusClass}">${statusText}</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${s.progress}%"></div>
            </div>
            ${s.message ? `<div style="font-size:0.7rem; color:#f85149; margin-top:2px;">${s.message}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    function updateItem(id, updates) {
      Object.assign(state[id], updates);
      renderLoadingUI();
    }

    // 关闭浮窗事件
    closeBtn.addEventListener('click', () => {
      loadingOverlay.classList.add('hidden');
    });

    // 允许用户在加载过程中查看状态，即使关闭后也可重新打开？但这里仅提供一次关闭。
    // 如果希望用户能再次打开，可以保留，但需求是“提供按钮去关闭它”，所以一次性关闭。

    // ==================== 资源监控实现 ====================

    // 1. libv86.js 加载监听
    const scriptEl = document.querySelector('script[src="./libv86.js"]');
    if (scriptEl) {
      scriptEl.addEventListener('load', () => {
        updateItem('libv86', { status: 'done', progress: 100 });
      });
      scriptEl.addEventListener('error', () => {
        updateItem('libv86', { status: 'error', progress: 0, message: '脚本加载失败' });
      });
    } else {
      updateItem('libv86', { status: 'error', progress: 0, message: '未找到 <script> 标签' });
    }

    // 2. 包装 fetch 监控 wasm 和 state 下载进度
    const originalFetch = window.fetch;
    const monitoredUrls = {
      './v86.wasm': 'wasm',
      'https://stuff.aoodyconcor.de/d/local/robin/v86state.bin?sign=rVokpNP7dAffY5DSjoNBAIRyQkww7sTcTdIbEv3hwqY=:0': 'state'
    };

    window.fetch = async function(input, init) {
      const requestUrl = typeof input === 'string' ? input : (input instanceof Request ? input.url : '');
      const resourceId = monitoredUrls[requestUrl];

      if (resourceId) {
        updateItem(resourceId, { status: 'loading', progress: 0 });
        try {
          const response = await originalFetch.call(window, input, init);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);

          const contentLength = response.headers.get('content-length');
          const total = contentLength ? parseInt(contentLength, 10) : 0;

          let loaded = 0;
          const reader = response.body.getReader();
          const stream = new ReadableStream({
            async start(controller) {
              try {
                while (true) {
                  const { done, value } = await reader.read();
                  if (done) {
                    controller.close();
                    return;
                  }
                  loaded += value.length;
                  if (total) {
                    const percent = Math.round((loaded / total) * 100);
                    updateItem(resourceId, { progress: percent });
                  }
                  controller.enqueue(value);
                }
              } catch (err) {
                controller.error(err);
              }
            }
          });

          const newResponse = new Response(stream, {
            status: response.status,
            statusText: response.statusText,
            headers: response.headers
          });
          updateItem(resourceId, { status: 'done', progress: 100 });
          return newResponse;
        } catch (err) {
          updateItem(resourceId, { status: 'error', progress: 0, message: err.message });
          throw err;
        }
      }
      return originalFetch.call(window, input, init);
    };

    // 3. Service Worker 注册
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => {
          updateItem('sw', { status: 'done', progress: 100 });
        })
        .catch(err => {
          updateItem('sw', { status: 'error', progress: 0, message: err.message });
        });
    } else {
      updateItem('sw', { status: 'error', progress: 0, message: '浏览器不支持' });
    }

    // 4. seabios / vgabios 存在性检测（HEAD 请求）
    async function checkHead(id, url) {
      try {
        updateItem(id, { status: 'loading' });
        const resp = await originalFetch(url, { method: 'HEAD' });
        if (resp.ok) {
          updateItem(id, { status: 'done', progress: 100, message: '文件可用（未使用）' });
        } else {
          throw new Error(`HTTP ${resp.status}`);
        }
      } catch (err) {
        updateItem(id, { status: 'error', progress: 0, message: err.message });
      }
    }
    checkHead('seabios', './seabios.bin');
    checkHead('vgabios', './vgabios.bin');

    // 初始渲染
    renderLoadingUI();

    // ==================== 错误提示 ====================
    function showError(message) {
      console.error('[SwC Terminal]', message);
      alert('⚠️ 错误：' + message);
    }

    // ==================== v86 初始化 ====================
    const screenDiv = document.getElementById('screen');
    const keyboardDiv = document.getElementById('keyboard');
    const dragHandle = document.getElementById('dragHandle');

    if (typeof V86 === 'undefined') {
      updateItem('v86engine', { status: 'error', progress: 0, message: 'V86 库未加载' });
      showError('V86 模拟器库加载失败，请检查网络或确认 libv86.js 存在。');
      return;
    }

    updateItem('v86engine', { status: 'loading', message: '正在创建模拟器...' });

    const config = {
      screen_container: screenDiv,
      state: {
        url: "https://stuff.aoodyconcor.de/d/local/robin/v86state.bin?sign=rVokpNP7dAffY5DSjoNBAIRyQkww7sTcTdIbEv3hwqY=:0"
      },
      wasm_path: "./v86.wasm",
      autostart: true,
      disable_keyboard: false,
      disable_speaker: true,
      acpi: true,
      memory_size: 1024,
    };

    let emulator;
    try {
      emulator = new V86(config);
      updateItem('v86engine', { status: 'loading', message: '模拟器已创建，等待启动...' });
    } catch (e) {
      updateItem('v86engine', { status: 'error', progress: 0, message: e.message });
      showError('初始化模拟器失败：' + e.message);
      return;
    }

    // 监听 v86 引擎事件
    if (emulator && emulator.add_listener) {
      emulator.add_listener('emulator-started', () => {
        updateItem('v86engine', { status: 'done', progress: 100, message: '系统已启动' });
      });
      emulator.add_listener('error', function(err) {
        let msg = '模拟器运行时错误';
        if (err && err.message) msg += '：' + err.message;
        else if (typeof err === 'string') msg += '：' + err;
        updateItem('v86engine', { status: 'error', progress: 0, message: msg });
        showError(msg);
      });
    } else {
      // 降级处理：一段时间后标记为完成
      setTimeout(() => {
        if (state['v86engine'].status === 'loading') {
          updateItem('v86engine', { status: 'done', progress: 100, message: '已启动（状态未知）' });
        }
      }, 8000);
    }

    // ==================== 键盘布局（与原版完全一致） ====================
    const keyRows = [
      {
        keys: [
          { label:'F1',  key:'F1',  code:'F1',  extraClass:'w40 modifier' },
          { label:'F2',  key:'F2',  code:'F2',  extraClass:'w40 modifier' },
          { label:'F3',  key:'F3',  code:'F3',  extraClass:'w40 modifier' },
          { label:'F4',  key:'F4',  code:'F4',  extraClass:'w40 modifier' },
          { label:'F5',  key:'F5',  code:'F5',  extraClass:'w40 modifier' },
          { label:'F6',  key:'F6',  code:'F6',  extraClass:'w40 modifier' },
          { label:'F7',  key:'F7',  code:'F7',  extraClass:'w40 modifier' },
          { label:'F8',  key:'F8',  code:'F8',  extraClass:'w40 modifier' },
          { label:'F9',  key:'F9',  code:'F9',  extraClass:'w40 modifier' },
          { label:'F10', key:'F10', code:'F10', extraClass:'w40 modifier' },
          { label:'F11', key:'F11', code:'F11', extraClass:'w40 modifier' },
          { label:'F12', key:'F12', code:'F12', extraClass:'w40 modifier' },
        ]
      },
      {
        keys: [
          { label:'Esc', key:'Escape',    code:'Escape',    extraClass:'w40 modifier' },
          { label:'`',   key:'`',         code:'Backquote', extraClass:'w40', shiftLabel:'~' },
          { label:'1',   key:'1',         code:'Digit1',    extraClass:'w40', shiftLabel:'!' },
          { label:'2',   key:'2',         code:'Digit2',    extraClass:'w40', shiftLabel:'@' },
          { label:'3',   key:'3',         code:'Digit3',    extraClass:'w40', shiftLabel:'#' },
          { label:'4',   key:'4',         code:'Digit4',    extraClass:'w40', shiftLabel:'$' },
          { label:'5',   key:'5',         code:'Digit5',    extraClass:'w40', shiftLabel:'%' },
          { label:'6',   key:'6',         code:'Digit6',    extraClass:'w40', shiftLabel:'^' },
          { label:'7',   key:'7',         code:'Digit7',    extraClass:'w40', shiftLabel:'&' },
          { label:'8',   key:'8',         code:'Digit8',    extraClass:'w40', shiftLabel:'*' },
          { label:'9',   key:'9',         code:'Digit9',    extraClass:'w40', shiftLabel:'(' },
          { label:'0',   key:'0',         code:'Digit0',    extraClass:'w40', shiftLabel:')' },
          { label:'-',   key:'-',         code:'Minus',     extraClass:'w40', shiftLabel:'_' },
          { label:'=',   key:'=',         code:'Equal',     extraClass:'w40', shiftLabel:'+' },
          { label:'⌫',   key:'Backspace', code:'Backspace', extraClass:'w60 modifier' },
        ]
      },
      {
        keys: [
          { label:'Tab', key:'Tab',  code:'Tab',  extraClass:'w60 modifier' },
          { label:'q',   key:'q',    code:'KeyQ', extraClass:'w40', shiftLabel:'Q' },
          { label:'w',   key:'w',    code:'KeyW', extraClass:'w40', shiftLabel:'W' },
          { label:'e',   key:'e',    code:'KeyE', extraClass:'w40', shiftLabel:'E' },
          { label:'r',   key:'r',    code:'KeyR', extraClass:'w40', shiftLabel:'R' },
          { label:'t',   key:'t',    code:'KeyT', extraClass:'w40', shiftLabel:'T' },
          { label:'y',   key:'y',    code:'KeyY', extraClass:'w40', shiftLabel:'Y' },
          { label:'u',   key:'u',    code:'KeyU', extraClass:'w40', shiftLabel:'U' },
          { label:'i',   key:'i',    code:'KeyI', extraClass:'w40', shiftLabel:'I' },
          { label:'o',   key:'o',    code:'KeyO', extraClass:'w40', shiftLabel:'O' },
          { label:'p',   key:'p',    code:'KeyP', extraClass:'w40', shiftLabel:'P' },
          { label:'[',   key:'[',    code:'BracketLeft',  extraClass:'w40', shiftLabel:'{' },
          { label:']',   key:']',    code:'BracketRight', extraClass:'w40', shiftLabel:'}' },
          { label:'\\',  key:'\\',   code:'Backslash',    extraClass:'w40', shiftLabel:'|' },
          { label:'Del', key:'Delete',code:'Delete', extraClass:'w40 modifier' },
        ]
      },
      {
        keys: [
          { label:'Caps', key:'CapsLock', code:'CapsLock', caps:true, extraClass:'w80 modifier' },
          { label:'a',    key:'a',   code:'KeyA', extraClass:'w40', shiftLabel:'A' },
          { label:'s',    key:'s',   code:'KeyS', extraClass:'w40', shiftLabel:'S' },
          { label:'d',    key:'d',   code:'KeyD', extraClass:'w40', shiftLabel:'D' },
          { label:'f',    key:'f',   code:'KeyF', extraClass:'w40', shiftLabel:'F' },
          { label:'g',    key:'g',   code:'KeyG', extraClass:'w40', shiftLabel:'G' },
          { label:'h',    key:'h',   code:'KeyH', extraClass:'w40', shiftLabel:'H' },
          { label:'j',    key:'j',   code:'KeyJ', extraClass:'w40', shiftLabel:'J' },
          { label:'k',    key:'k',   code:'KeyK', extraClass:'w40', shiftLabel:'K' },
          { label:'l',    key:'l',   code:'KeyL', extraClass:'w40', shiftLabel:'L' },
          { label:';',    key:';',   code:'Semicolon', extraClass:'w40', shiftLabel:':' },
          { label:"'",    key:"'",   code:'Quote',     extraClass:'w40', shiftLabel:'"' },
          { label:'Enter',key:'Enter',code:'Enter', extraClass:'w100 modifier' },
        ]
      },
      {
        keys: [
          { label:'Shift', key:'Shift', code:'ShiftLeft',  shift:true, extraClass:'w100 modifier' },
          { label:'z',     key:'z',     code:'KeyZ', extraClass:'w40', shiftLabel:'Z' },
          { label:'x',     key:'x',     code:'KeyX', extraClass:'w40', shiftLabel:'X' },
          { label:'c',     key:'c',     code:'KeyC', extraClass:'w40', shiftLabel:'C' },
          { label:'v',     key:'v',     code:'KeyV', extraClass:'w40', shiftLabel:'V' },
          { label:'b',     key:'b',     code:'KeyB', extraClass:'w40', shiftLabel:'B' },
          { label:'n',     key:'n',     code:'KeyN', extraClass:'w40', shiftLabel:'N' },
          { label:'m',     key:'m',     code:'KeyM', extraClass:'w40', shiftLabel:'M' },
          { label:',',     key:',',     code:'Comma',  extraClass:'w40', shiftLabel:'<' },
          { label:'.',     key:'.',     code:'Period', extraClass:'w40', shiftLabel:'>' },
          { label:'/',     key:'/',     code:'Slash',  extraClass:'w40', shiftLabel:'?' },
          { label:'↑',     key:'ArrowUp',code:'ArrowUp', extraClass:'w40' },
          { label:'Shift', key:'Shift', code:'ShiftRight', shift:true, extraClass:'w80 modifier' },
        ]
      },
      {
        keys: [
          { label:'Fn',   key:'Fn',            code:'Fn',            extraClass:'w40 modifier' },
          { label:'Ctrl', key:'Control',       code:'ControlLeft',   extraClass:'w40 modifier' },
          { label:'Win',  key:'Meta',          code:'MetaLeft',      extraClass:'w40 modifier' },
          { label:'Alt',  key:'Alt',           code:'AltLeft',       extraClass:'w40 modifier' },
          { label:'Space',key:' ',             code:'Space',         extraClass:'w220' },
          { label:'Alt',  key:'Alt',           code:'AltRight',      extraClass:'w40 modifier' },
          { label:'Ctrl', key:'Control',       code:'ControlRight',  extraClass:'w40 modifier' },
          { label:'←',    key:'ArrowLeft',     code:'ArrowLeft',     extraClass:'w40' },
          { label:'↓',    key:'ArrowDown',     code:'ArrowDown',     extraClass:'w40' },
          { label:'→',    key:'ArrowRight',    code:'ArrowRight',    extraClass:'w40' },
          { label:'Fn',   key:'Fn',            code:'Fn',            extraClass:'w40 modifier' },
        ]
      }
    ];

    const pressedKeys = new Set();
    let capsActive = false;
    const allButtons = [];

    function dispatchKeyEvent(type, code, key, keyCode) {
      if (!emulator) return;
      if (keyCode === 0 && key && key.length === 1) {
        keyCode = key.charCodeAt(0);
      }
      const event = new KeyboardEvent(type, {
        key: key,
        code: code,
        keyCode: keyCode,
        which: keyCode,
        bubbles: true,
        cancelable: true,
        view: window,
        location: code.includes('Left') ? 1 : (code.includes('Right') ? 2 : 0),
      });
      if (type === 'keypress') {
        Object.defineProperty(event, 'charCode', { value: keyCode });
      }
      screenDiv.dispatchEvent(event);
    }

    function updateButtonLabels() {
      const shift = pressedKeys.has('ShiftLeft') || pressedKeys.has('ShiftRight');
      allButtons.forEach(btn => {
        const kd = btn._keyData;
        if (!kd) return;
        if (kd.shift) {
          btn.textContent = shift ? '▲ Shift' : 'Shift';
        } else if (kd.caps) {
          btn.textContent = capsActive ? '▲ Caps' : 'Caps';
        } else {
          const useShift = (shift || capsActive) && kd.shiftLabel;
          btn.textContent = useShift ? kd.shiftLabel : kd.label;
        }
      });
    }

    function onPointerDown(e, keyData, btn) {
      e.preventDefault();
      e.stopPropagation();
      const code = keyData.code;

      if (keyData.caps) {
        capsActive = !capsActive;
        btn.classList.toggle('active', capsActive);
        dispatchKeyEvent('keydown', code, 'CapsLock', 20);
        dispatchKeyEvent('keyup', code, 'CapsLock', 20);
        updateButtonLabels();
        return;
      }

      const key = keyData.shift ? 'Shift' : keyData.key;
      const keyCode = keyData.shift ? 16 : 0;

      if (code === 'Space') {
        dispatchKeyEvent('keydown', code, key, 32);
        dispatchKeyEvent('keypress', code, key, 32);
        dispatchKeyEvent('keyup', code, key, 32);
        updateButtonLabels();
        return;
      }

      pressedKeys.add(code);
      dispatchKeyEvent('keydown', code, key, keyCode);

      if (!keyData.shift && !keyData.caps && key && key.length === 1) {
        const charCode = key.charCodeAt(0);
        dispatchKeyEvent('keypress', code, key, charCode);
      }

      btn.classList.add('pressed');
      updateButtonLabels();
    }

    function onPointerUp(e, keyData, btn) {
      e.preventDefault();
      const code = keyData.code;
      if (code === 'Space') return;

      pressedKeys.delete(code);
      const key = keyData.shift ? 'Shift' : keyData.key;
      const keyCode = keyData.shift ? 16 : 0;
      dispatchKeyEvent('keyup', code, key, keyCode);

      btn.classList.remove('pressed');
      updateButtonLabels();
    }

    function buildButton(keyData) {
      const btn = document.createElement('div');
      btn.className = 'key-btn ' + (keyData.extraClass || '');
      btn.textContent = keyData.label;
      btn._keyData = keyData;
      btn.addEventListener('pointerdown', e => onPointerDown(e, keyData, btn));
      btn.addEventListener('pointerup', e => onPointerUp(e, keyData, btn));
      btn.addEventListener('pointerleave', e => {
        if (btn.classList.contains('pressed')) {
          onPointerUp(e, keyData, btn);
        }
      });
      return btn;
    }

    function buildKeyboard() {
      keyboardDiv.querySelectorAll('.key-row').forEach(r => r.remove());
      allButtons.length = 0;
      keyRows.forEach(rowDef => {
        const row = document.createElement('div');
        row.className = 'key-row';
        rowDef.keys.forEach(k => {
          const btn = buildButton(k);
          row.appendChild(btn);
          allButtons.push(btn);
        });
        keyboardDiv.appendChild(row);
      });
    }

    buildKeyboard();

    // ========== 二维拖动 ==========
    let dragging = false;
    let startX, startY, initialLeft, initialTop;

    function startDrag(e) {
      e.preventDefault();
      dragging = true;
      startX = e.clientX;
      startY = e.clientY;
      const rect = keyboardDiv.getBoundingClientRect();
      initialLeft = rect.left;
      initialTop = rect.top;
      keyboardDiv.style.transform = 'none';
      keyboardDiv.style.left = initialLeft + 'px';
      keyboardDiv.style.top = initialTop + 'px';
      keyboardDiv.style.bottom = 'auto';
      dragHandle.setPointerCapture(e.pointerId);
    }

    function moveDrag(e) {
      if (!dragging) return;
      e.preventDefault();
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      let newLeft = initialLeft + dx;
      let newTop = initialTop + dy;
      const maxLeft = window.innerWidth - keyboardDiv.offsetWidth;
      const maxTop = window.innerHeight - keyboardDiv.offsetHeight;
      newLeft = Math.max(0, Math.min(newLeft, maxLeft));
      newTop = Math.max(0, Math.min(newTop, maxTop));
      keyboardDiv.style.left = newLeft + 'px';
      keyboardDiv.style.top = newTop + 'px';
    }

    function endDrag() {
      if (!dragging) return;
      dragging = false;
    }

    dragHandle.addEventListener('pointerdown', startDrag);
    document.addEventListener('pointermove', moveDrag);
    document.addEventListener('pointerup', endDrag);

    keyboardDiv.style.left = '50%';
    keyboardDiv.style.top = 'auto';
    keyboardDiv.style.bottom = '8px';
    keyboardDiv.style.transform = 'translateX(-50%)';

    window.addEventListener('resize', () => {
      if (!dragging) {
        keyboardDiv.style.left = '50%';
        keyboardDiv.style.transform = 'translateX(-50%)';
      }
    });

  })();
  </script>
</body>
</html>
