<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>状态文件链接测试</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #0d1117; color: #c9d1d9; }
        button { padding: 10px 20px; font-size: 16px; margin: 10px 0; }
        pre { background: #161b22; padding: 15px; border-radius: 6px; overflow-x: auto; }
        .success { color: #3fb950; }
        .error { color: #f85149; }
    </style>
</head>
<body>
    <h2>🔗 状态文件链接可行性测试</h2>
    <p>目标 URL: <code id="url"></code></p>
    <button onclick="testUrl()">🚀 发送测试请求</button>
    <pre id="log"></pre>

    <script>
        const targetUrl = "https://stuff.aoodyconcor.de/d/local/robin/v86state.bin?sign=rVokpNP7dAffY5DSjoNBAIRyQkww7sTcTdIbEv3hwqY=:0";
        document.getElementById('url').textContent = targetUrl;

        async function testUrl() {
            const log = document.getElementById('log');
            log.innerHTML = '开始测试...\n';
            try {
                const response = await fetch(targetUrl);
                log.innerHTML += `✅ 请求成功，状态码: ${response.status}\n`;
                log.innerHTML += `Content-Type: ${response.headers.get('content-type')}\n`;
                log.innerHTML += `Content-Length: ${response.headers.get('content-length')}\n`;
                
                const buffer = await response.arrayBuffer();
                const bytes = new Uint8Array(buffer);
                log.innerHTML += `文件大小: ${buffer.byteLength} 字节\n`;
                log.innerHTML += `前8字节 (hex): ${Array.from(bytes.slice(0, 8)).map(b => b.toString(16).padStart(2, '0')).join(' ')}\n`;
                
                // 检查 zstd 魔术数字
                const isZstd = bytes[0] === 0x28 && bytes[1] === 0xB5 && bytes[2] === 0x2F && bytes[3] === 0xFD;
                if (isZstd) {
                    log.innerHTML += `✅ 文件是 Zstandard 压缩格式 (v86 标准快照)\n`;
                } else {
                    log.innerHTML += `⚠️ 文件不是 zstd 格式，可能无法直接加载\n`;
                }
                
                log.innerHTML += `\n🎉 结论：链接可直接拉取，无 CORS 拦截！`;
            } catch (err) {
                log.innerHTML += `❌ 请求失败: ${err.message}\n`;
                if (err.message.includes('CORS')) {
                    log.innerHTML += `⚠️ 原因：跨域请求被阻止，需服务器添加 CORS 头`;
                }
            }
        }
    </script>
</body>
</html>
